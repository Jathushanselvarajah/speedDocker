name: Deploy to GitHub Pages

on:
  push:
    branches: [main, feature/deploy]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          # Find where templates are stored in this image
          echo "Looking for export templates..."
          find /root/.local -name "*.tpz" -o -name "web*" 2>/dev/null | head -20 || true
          ls -la /root/.local/share/godot/ 2>/dev/null || true
          ls -la /root/.local/share/godot/export_templates/ 2>/dev/null || true
          ls -la /root/.local/share/godot/templates/ 2>/dev/null || true
          # Ensure templates are in the expected location
          TEMPLATE_DIR="/root/.local/share/godot/export_templates/4.3.stable"
          if [ ! -d "$TEMPLATE_DIR" ]; then
            mkdir -p "$TEMPLATE_DIR"
            # Try to copy from alternative locations
            if [ -d "/root/.local/share/godot/templates/4.3.stable" ]; then
              cp -r /root/.local/share/godot/templates/4.3.stable/* "$TEMPLATE_DIR/" || true
            fi
          fi
          echo "Template dir contents:"
          ls -la "$TEMPLATE_DIR" 2>/dev/null || echo "Template dir is empty or missing"

      - name: Import project
        run: |
          godot --headless --import 2>&1 || true

      - name: Create build directory
        run: mkdir -p build/web

      - name: Export Web
        run: godot --headless --export-release "Web" build/web/index.html

      - name: Add coi-serviceworker for SharedArrayBuffer support
        run: |
          wget -q https://raw.githubusercontent.com/niclasleonbock/coi-serviceworker/refs/heads/no-clean-up/coi-serviceworker.min.js -O build/web/coi-serviceworker.min.js
          sed -i 's|<head>|<head><script src="coi-serviceworker.min.js"></script>|' build/web/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: export
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
