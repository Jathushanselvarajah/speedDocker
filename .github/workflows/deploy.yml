name: Deploy to GitHub Pages

on:
  push:
    branches: [main, feature/deploy]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  GODOT_VERSION: "4.3"

jobs:
  export:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/4.3.stable"
          mkdir -p "$TEMPLATES_DIR"
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz -O /tmp/templates.tpz
          unzip -o /tmp/templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* "$TEMPLATES_DIR/"
          rm -rf /tmp/templates /tmp/templates.tpz
          echo "Templates installed:"
          ls "$TEMPLATES_DIR" | grep web

      - name: Import project
        run: godot --headless --import 2>&1 || true

      - name: Create build directory
        run: mkdir -p build/web

      - name: Export Web
        run: godot --headless --export-release "Web" build/web/index.html

      - name: Add coi-serviceworker for SharedArrayBuffer support
        run: |
          wget -q https://raw.githubusercontent.com/niclasleonbock/coi-serviceworker/refs/heads/no-clean-up/coi-serviceworker.min.js -O build/web/coi-serviceworker.min.js
          sed -i 's|<head>|<head><script src="coi-serviceworker.min.js"></script>|' build/web/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: export
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
